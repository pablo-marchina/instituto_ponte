name: Deploy GitHub Pages

on:
  push:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    if: github.event_name == 'workflow_dispatch' || github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/view/package-lock.json

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6
        with:
          enablement: ${{ secrets.PAGES_ENABLEMENT_TOKEN != '' }}
          token: ${{ secrets.PAGES_ENABLEMENT_TOKEN || github.token }}

      - name: Configure frontend environment
        env:
          CONFIGURED_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          CONFIGURED_BASE_PATH: ${{ vars.VITE_BASE_PATH }}
          CONFIGURED_ALUNO_BASE_URL: ${{ vars.VITE_ALUNO_BASE_URL }}
          CONFIGURED_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          CONFIGURED_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: |
          repo_name="${GITHUB_REPOSITORY#*/}"
          owner_name="${GITHUB_REPOSITORY_OWNER}"
          repo_lower="$(printf '%s' "$repo_name" | tr '[:upper:]' '[:lower:]')"
          owner_lower="$(printf '%s' "$owner_name" | tr '[:upper:]' '[:lower:]')"

          if [ -n "$CONFIGURED_BASE_PATH" ]; then
            vite_base_path="$CONFIGURED_BASE_PATH"
          elif [ "$repo_lower" = "${owner_lower}.github.io" ]; then
            vite_base_path="/"
          else
            vite_base_path="/${repo_name}/"
          fi

          if [ "$vite_base_path" != "/" ]; then
            vite_base_path="/$(printf '%s' "$vite_base_path" | sed 's#^/*##; s#/*$##')/"
          fi

          if [ -n "$CONFIGURED_ALUNO_BASE_URL" ]; then
            aluno_base_url="$CONFIGURED_ALUNO_BASE_URL"
          elif [ "$repo_lower" = "${owner_lower}.github.io" ]; then
            aluno_base_url="https://${repo_name}/aluno/prova"
          else
            aluno_base_url="https://${owner_name}.github.io/${repo_name}/aluno/prova"
          fi

          if [ -z "$CONFIGURED_API_BASE_URL" ]; then
            echo "::warning::VITE_API_BASE_URL nao foi configurada. O Pages sera publicado, mas os fluxos reais precisam de uma WebAPI publica HTTPS."
            configured_api_base_url="http://localhost:3333/api/v1"
          else
            configured_api_base_url="$CONFIGURED_API_BASE_URL"
          fi

          {
            printf 'VITE_BASE_PATH=%s\n' "$vite_base_path"
            printf 'VITE_API_BASE_URL=%s\n' "$configured_api_base_url"
            printf 'VITE_ALUNO_BASE_URL=%s\n' "$aluno_base_url"
            printf 'VITE_SUPABASE_URL=%s\n' "$CONFIGURED_SUPABASE_URL"
            printf 'VITE_SUPABASE_PUBLISHABLE_KEY=%s\n' "$CONFIGURED_SUPABASE_PUBLISHABLE_KEY"
          } >> "$GITHUB_ENV"

      - name: Install frontend dependencies
        run: npm --prefix src/view ci

      - name: Typecheck frontend
        run: npm --prefix src/view run typecheck

      - name: Build frontend
        run: npm --prefix src/view run build

      - name: Add SPA fallback
        run: cp src/view/dist/index.html src/view/dist/404.html

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: src/view/dist

  deploy:
    if: github.event_name == 'workflow_dispatch' || github.ref_name == github.event.repository.default_branch
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
